<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <!-- 高维空间外框 -->
  <rect x="30" y="42" width="660" height="230" rx="10" fill="#8888aa" fill-opacity="0.05" stroke="#888" stroke-opacity="0.5"/>
  <text x="360" y="30" fill="#888" font-size="14" text-anchor="middle">高维「图像空间」（真实约 20 万维，这里用 2D 示意）</text>

  <!-- 散落的噪声点(几乎处处) -->
  <g fill="#8888aa" fill-opacity="0.7">
    <circle cx="90" cy="90" r="3"/><circle cx="150" cy="230" r="3"/><circle cx="220" cy="80" r="3"/><circle cx="300" cy="240" r="3"/>
    <circle cx="420" cy="70" r="3"/><circle cx="500" cy="235" r="3"/><circle cx="560" cy="90" r="3"/><circle cx="640" cy="220" r="3"/>
    <circle cx="120" cy="160" r="3"/><circle cx="380" cy="150" r="3"/><circle cx="470" cy="130" r="3"/><circle cx="620" cy="150" r="3"/>
    <circle cx="200" cy="180" r="3"/><circle cx="330" cy="95" r="3"/><circle cx="540" cy="180" r="3"/>
  </g>

  <!-- 真实图像分布: 一条狭窄弯曲的流形 -->
  <path d="M110,230 C 230,110 350,250 480,140 S 640,120 660,175" fill="none" stroke="#4c86c6" stroke-width="26" stroke-opacity="0.18" stroke-linecap="round"/>
  <path d="M110,230 C 230,110 350,250 480,140 S 640,120 660,175" fill="none" stroke="#4c86c6" stroke-width="2.5" stroke-opacity="0.9" stroke-linecap="round"/>
  <text x="300" y="205" fill="#4c86c6" font-size="14" font-weight="600">真实图像分布 p_data</text>
  <text x="300" y="224" fill="#4c86c6" font-size="12.5">狭窄 · 弯曲 · 复杂</text>

  <!-- 标注: 流形上=像样的图 -->
  <circle cx="238" cy="163" r="5" fill="#4c86c6"/>
  <text x="250" y="150" fill="#4c86c6" font-size="12.5">✓ 落在这条带上 → 像样的图</text>

  <!-- 标注: 流形外=噪声 -->
  <circle cx="560" cy="90" r="5" fill="#c94f4f"/>
  <text x="452" y="78" fill="#c94f4f" font-size="12.5">✗ 随便取一点 → 几乎必是噪声</text>
</svg>
