<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#d98c3f"/>
    </marker>
  </defs>

  <!-- 时间轴 -->
  <line x1="120" y1="345" x2="640" y2="345" stroke="#888" stroke-width="1.2"/>
  <polygon points="640,345 632,341 632,349" fill="#888"/>
  <text x="120" y="368" fill="#888" font-size="15" text-anchor="middle">t = 1（噪声）</text>
  <text x="640" y="368" fill="#888" font-size="15" text-anchor="middle">t = 0（数据）</text>
  <text x="380" y="368" fill="#888" font-size="14" text-anchor="middle">— 跟着速度场 v(x,t) 积分 ODE —</text>

  <!-- 噪声分布(左) -->
  <ellipse cx="120" cy="190" rx="46" ry="120" fill="#8888aa" fill-opacity="0.12" stroke="#8888aa" stroke-opacity="0.5" stroke-dasharray="4 4"/>
  <text x="120" y="45" fill="#8888aa" font-size="16" text-anchor="middle" font-weight="600">噪声 ε ~ N(0, I)</text>

  <!-- 数据分布(右) 两个簇 -->
  <ellipse cx="642" cy="130" rx="40" ry="42" fill="#4c86c6" fill-opacity="0.12" stroke="#4c86c6" stroke-opacity="0.5" stroke-dasharray="4 4"/>
  <ellipse cx="642" cy="268" rx="40" ry="42" fill="#4c86c6" fill-opacity="0.12" stroke="#4c86c6" stroke-opacity="0.5" stroke-dasharray="4 4"/>
  <text x="642" y="45" fill="#4c86c6" font-size="16" text-anchor="middle" font-weight="600">数据分布 x</text>

  <!-- 直线搬运路径 + 箭头 -->
  <g stroke="#d98c3f" stroke-width="1.8" marker-end="url(#arrow)" opacity="0.85">
    <line x1="120" y1="110" x2="632" y2="120"/>
    <line x1="112" y1="205" x2="632" y2="140"/>
    <line x1="132" y1="170" x2="628" y2="150"/>
    <line x1="126" y1="248" x2="634" y2="258"/>
    <line x1="110" y1="288" x2="628" y2="285"/>
  </g>

  <!-- 噪声点 -->
  <g fill="#8888aa">
    <circle cx="120" cy="110" r="4"/><circle cx="112" cy="205" r="4"/><circle cx="132" cy="170" r="4"/>
    <circle cx="126" cy="248" r="4"/><circle cx="110" cy="288" r="4"/>
  </g>
  <!-- 数据点 -->
  <g fill="#4c86c6">
    <circle cx="632" cy="120" r="4"/><circle cx="632" cy="140" r="4"/><circle cx="628" cy="150" r="4"/>
    <circle cx="634" cy="258" r="4"/><circle cx="628" cy="285" r="4"/>
  </g>

  <!-- 速度标注 -->
  <text x="378" y="150" fill="#d98c3f" font-size="15" text-anchor="middle" font-style="italic">沿直线搬运 · 速度恒定</text>
</svg>
