<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 210" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="a2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#d98c3f"/>
    </marker>
  </defs>

  <!-- 一张图像: 4x4 像素格 -->
  <text x="78" y="36" fill="#888" font-size="14" text-anchor="middle">一张图像</text>
  <g stroke="#fff" stroke-width="1">
    <rect x="30" y="45" width="24" height="24" fill="#c94f4f"/><rect x="54" y="45" width="24" height="24" fill="#e0a44c"/><rect x="78" y="45" width="24" height="24" fill="#6fae6f"/><rect x="102" y="45" width="24" height="24" fill="#4c86c6"/>
    <rect x="30" y="69" width="24" height="24" fill="#e0a44c"/><rect x="54" y="69" width="24" height="24" fill="#8f6fbf"/><rect x="78" y="69" width="24" height="24" fill="#4c86c6"/><rect x="102" y="69" width="24" height="24" fill="#c94f4f"/>
    <rect x="30" y="93" width="24" height="24" fill="#6fae6f"/><rect x="54" y="93" width="24" height="24" fill="#4c86c6"/><rect x="78" y="93" width="24" height="24" fill="#e0a44c"/><rect x="102" y="93" width="24" height="24" fill="#8f6fbf"/>
    <rect x="30" y="117" width="24" height="24" fill="#4c86c6"/><rect x="54" y="117" width="24" height="24" fill="#c94f4f"/><rect x="78" y="117" width="24" height="24" fill="#6fae6f"/><rect x="102" y="117" width="24" height="24" fill="#e0a44c"/>
  </g>

  <!-- 展平箭头 -->
  <line x1="135" y1="93" x2="192" y2="93" stroke="#d98c3f" stroke-width="1.8" marker-end="url(#a2)"/>
  <text x="163" y="82" fill="#d98c3f" font-size="13" text-anchor="middle">展平</text>

  <!-- 向量 -->
  <g font-size="12" text-anchor="middle">
    <g stroke="#888" stroke-width="1" fill="none">
      <rect x="205" y="81" width="30" height="24"/><rect x="235" y="81" width="30" height="24"/><rect x="265" y="81" width="30" height="24"/><rect x="295" y="81" width="30" height="24"/><rect x="325" y="81" width="30" height="24"/><rect x="355" y="81" width="30" height="24"/>
    </g>
    <g fill="#888">
      <text x="220" y="98">.20</text><text x="250" y="98">.98</text><text x="280" y="98">.51</text><text x="310" y="98">.07</text><text x="340" y="98">.83</text><text x="370" y="98">…</text>
    </g>
  </g>
  <text x="295" y="128" fill="#888" font-size="13" text-anchor="middle">= 256×256×3 ≈ 20 万个数字</text>

  <!-- 看作箭头 -->
  <line x1="398" y1="93" x2="455" y2="93" stroke="#d98c3f" stroke-width="1.8" marker-end="url(#a2)"/>
  <text x="426" y="82" fill="#d98c3f" font-size="13" text-anchor="middle">看作</text>

  <!-- 高维空间里的一个点 -->
  <line x1="500" y1="120" x2="640" y2="120" stroke="#888" stroke-width="1"/>
  <line x1="515" y1="55" x2="515" y2="128" stroke="#888" stroke-width="1"/>
  <circle cx="585" cy="80" r="5" fill="#4c86c6"/>
  <line x1="585" y1="80" x2="585" y2="120" stroke="#4c86c6" stroke-width="0.8" stroke-dasharray="3 3"/>
  <line x1="585" y1="80" x2="515" y2="80" stroke="#4c86c6" stroke-width="0.8" stroke-dasharray="3 3"/>
  <text x="575" y="152" fill="#4c86c6" font-size="14" text-anchor="middle" font-weight="600">高维空间里的 1 个点</text>
</svg>
