<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 350" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="ab" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4c86c6"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#c94f4f"/>
    </marker>
  </defs>

  <!-- 分隔线 -->
  <line x1="380" y1="55" x2="380" y2="315" stroke="#888" stroke-opacity="0.3" stroke-dasharray="4 4"/>

  <!-- ================= 左：直线交叉 ================= -->
  <text x="195" y="34" fill="#888" font-size="14.5" text-anchor="middle" font-weight="600">① 设计的条件路径 = 直线</text>

  <g stroke="#d98c3f" stroke-width="1.8" stroke-opacity="0.85">
    <line x1="45" y1="90"  x2="345" y2="250"/>
    <line x1="45" y1="250" x2="345" y2="90"/>
    <line x1="45" y1="145" x2="345" y2="210"/>
    <line x1="45" y1="210" x2="345" y2="145"/>
  </g>

  <!-- 噪声/数据端点 -->
  <g fill="#8888aa"><circle cx="45" cy="90" r="4"/><circle cx="45" cy="145" r="4"/><circle cx="45" cy="210" r="4"/><circle cx="45" cy="250" r="4"/></g>
  <g fill="#4c86c6"><circle cx="345" cy="90" r="4"/><circle cx="345" cy="145" r="4"/><circle cx="345" cy="210" r="4"/><circle cx="345" cy="250" r="4"/></g>

  <!-- 交叉点冲突速度 -->
  <line x1="195" y1="170" x2="235" y2="192" stroke="#c94f4f" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="195" y1="170" x2="235" y2="148" stroke="#c94f4f" stroke-width="2" marker-end="url(#ar)"/>
  <circle cx="195" cy="170" r="5" fill="#c94f4f"/>
  <text x="150" y="300" fill="#c94f4f" font-size="12.5">同一点，两个冲突的速度</text>

  <!-- ================= 右：取平均→弯曲 ================= -->
  <text x="575" y="34" fill="#888" font-size="14.5" text-anchor="middle" font-weight="600">② 实际学到的流 = 弯曲</text>

  <g fill="none" stroke="#4c86c6" stroke-width="1.9" marker-end="url(#ab)">
    <path d="M415,100 C 520,74 640,126 730,100"/>
    <path d="M415,155 C 520,129 640,181 730,155"/>
    <path d="M415,205 C 520,179 640,231 730,205"/>
    <path d="M415,255 C 520,229 640,281 730,255"/>
  </g>

  <!-- 平均速度 -->
  <line x1="575" y1="178" x2="612" y2="178" stroke="#6fae6f" stroke-width="2.4" marker-end="url(#ab)"/>
  <circle cx="575" cy="178" r="5" fill="#6fae6f"/>
  <text x="548" y="300" fill="#6fae6f" font-size="12.5">取平均 → 单个速度</text>

  <!-- 底部说明 -->
  <text x="195" y="335" fill="#888" font-size="13" text-anchor="middle">直线彼此交叉</text>
  <text x="575" y="335" fill="#888" font-size="13" text-anchor="middle">轨迹弯曲、互不相交</text>
</svg>
