<svg width="100%" viewBox="0 0 680 396" role="img" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
<title>The three components of a planning stack and what we substituted</title>
<desc>A true model-based planning stack needs three parts: a policy, a world model, and a value model. SmolVLA only provides the policy. In our experiments we substituted the real simulator for the world model and the full-rollout terminal reward for the value model, so the loop only works in simulation.</desc>
