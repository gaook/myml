# 线上正式域名（Cloudflare Workers 稳定地址；以后接自定义域名再改这里）
baseURL = "https://myml.gaook.workers.dev/"
languageCode = "zh-cn"
title = "我的深度学习笔记"
theme = "PaperMod"

# 让文章列表显示摘要
[params]
  defaultTheme = "auto"          # 自动适配深色/浅色
  ShowReadingTime = true         # 显示阅读时长
  ShowShareButtons = false
  ShowCodeCopyButtons = true     # 代码块右上角「复制」按钮
  ShowToc = true                 # 文章内显示目录
  TocOpen = false
  math = true                    # 开启数学公式总开关

  [params.homeInfoParams]
    Title = "新时代码农的倔强 👋"
    Content = "这里记录我在深度学习路上的学习心得、踩坑笔记和论文复现。我是一个2007年硕士毕业的码农.20-30岁的时候,我觉得没有什么事情是做不成的.然而时代剧烈的改变,就算一个自以为是的人天天自认为是GPU领域的资深专家,在AI深入耕耘过的土地上,也发现难以做到在尽可能多的地方都有深入的理解.我特别理解作为一个天天啃代码的传统码农,又特别希望每件事情都刨根问底的人,在AI知识海洋中的无力感.虽然工作非常繁忙,但我特别希望写些什么,来记录一下我的“乱七八糟”的一些“刨根问底”。"

# 顶部导航菜单
[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10
[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 20
[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 30

# 开启搜索功能需要的输出格式
[outputs]
  home = ["HTML", "RSS", "JSON"]

# 代码高亮配置
[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true                # 允许在 Markdown 里写 HTML
  # 让 Markdown 不去处理公式内容（否则 _ 会变斜体、\, \! 等被吃掉），原样交给 KaTeX
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block  = [['$$', '$$'], ['\[', '\]']]
      inline = [['$', '$'], ['\(', '\)']]